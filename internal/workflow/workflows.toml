# =============================================================================
# STATE GROUPS (reusable transition sets)
# =============================================================================

[state-groups.tdd-loop.states]
tdd_red_produce = true
tdd_red_qa = true
tdd_red_decide = true
tdd_green_produce = true
tdd_green_qa = true
tdd_green_decide = true
tdd_refactor_produce = true
tdd_refactor_qa = true
tdd_refactor_decide = true
tdd_commit = true
item_escalated = true
item_parked = true
merge_acquire = true
rebase = true
merge = true
worktree_cleanup = true

[state-groups.tdd-loop.transitions]
tdd_red_produce = ["tdd_red_qa"]
tdd_red_qa = ["tdd_red_decide"]
tdd_red_decide = ["tdd_red_produce", "tdd_green_produce", "item_escalated"]
tdd_green_produce = ["tdd_green_qa"]
tdd_green_qa = ["tdd_green_decide"]
tdd_green_decide = ["tdd_green_produce", "tdd_refactor_produce", "item_escalated"]
tdd_refactor_produce = ["tdd_refactor_qa"]
tdd_refactor_qa = ["tdd_refactor_decide"]
tdd_refactor_decide = ["tdd_refactor_produce", "tdd_commit", "item_escalated"]
tdd_commit = ["merge_acquire"]
item_escalated = ["item_parked"]
item_parked = ["item_join"]
merge_acquire = ["rebase"]
rebase = ["merge"]
merge = ["worktree_cleanup"]
worktree_cleanup = ["item_join"]

[state-groups.item-execution.states]
item_select = true
item_fork = true
worktree_create = true
item_join = true
item_assess = true
items_done = true

[state-groups.item-execution.transitions]
item_select = ["item_fork"]
item_fork = ["worktree_create"]
worktree_create = ["tdd_red_produce"]
item_join = ["item_assess"]
item_assess = ["item_select", "items_done", "tdd_red_produce"]

[state-groups.main-ending.states]
alignment_produce = true
alignment_qa = true
alignment_decide = true
alignment_commit = true
retro_produce = true
retro_qa = true
retro_decide = true
retro_commit = true
summary_produce = true
summary_qa = true
summary_decide = true
summary_commit = true
issue_update = true
next_steps = true
complete = true

[state-groups.main-ending.transitions]
alignment_produce = ["alignment_qa"]
alignment_qa = ["alignment_decide"]
alignment_decide = ["alignment_produce", "alignment_commit", "phase_blocked"]
alignment_commit = ["retro_produce"]
retro_produce = ["retro_qa"]
retro_qa = ["retro_decide"]
retro_decide = ["retro_produce", "retro_commit", "phase_blocked"]
retro_commit = ["summary_produce"]
summary_produce = ["summary_qa"]
summary_qa = ["summary_decide"]
summary_decide = ["summary_produce", "summary_commit", "phase_blocked"]
summary_commit = ["issue_update"]
issue_update = ["next_steps"]
next_steps = ["complete"]
complete = []

# =============================================================================
# WORKFLOWS
# =============================================================================

[workflows.new]
init_state = "pm_produce"
include_groups = ["tdd-loop", "item-execution", "main-ending"]

[workflows.new.transitions]
pm_produce = ["pm_qa"]
pm_qa = ["pm_decide"]
pm_decide = ["pm_produce", "pm_commit", "phase_blocked"]
pm_commit = ["design_produce"]
design_produce = ["design_qa"]
design_qa = ["design_decide"]
design_decide = ["design_produce", "design_commit", "phase_blocked"]
design_commit = ["arch_produce"]
arch_produce = ["arch_qa"]
arch_qa = ["arch_decide"]
arch_decide = ["arch_produce", "arch_commit", "phase_blocked"]
arch_commit = ["breakdown_produce"]
breakdown_produce = ["breakdown_qa"]
breakdown_qa = ["breakdown_decide"]
breakdown_decide = ["breakdown_produce", "breakdown_commit", "phase_blocked"]
breakdown_commit = ["item_select"]
items_done = ["documentation_produce"]
documentation_produce = ["documentation_qa"]
documentation_qa = ["documentation_decide"]
documentation_decide = ["documentation_produce", "documentation_commit", "phase_blocked"]
documentation_commit = ["alignment_produce"]

[workflows.scoped]
init_state = "item_select"
include_groups = ["tdd-loop", "item-execution", "main-ending"]

[workflows.scoped.transitions]
items_done = ["documentation_produce"]
documentation_produce = ["documentation_qa"]
documentation_qa = ["documentation_decide"]
documentation_decide = ["documentation_produce", "documentation_commit", "phase_blocked"]
documentation_commit = ["alignment_produce"]

[workflows.align]
init_state = "align_infer_tests_produce"
include_groups = ["main-ending"]

[workflows.align.transitions]
align_infer_tests_produce = ["align_infer_arch_produce"]
align_infer_arch_produce = ["align_infer_design_produce"]
align_infer_design_produce = ["align_infer_reqs_produce"]
align_infer_reqs_produce = ["align_crosscut_qa"]
align_crosscut_qa = ["align_crosscut_decide"]
align_crosscut_decide = ["align_infer_tests_produce", "align_artifact_commit", "phase_blocked"]
align_artifact_commit = ["alignment_produce"]
