# Declarative workflow state machine for projctl.
# Every state is explicit — no hidden sub-states.
# The pair loop is expressed as flat transitions: produce → qa → decide → produce|commit.

# =============================================================================
# STATES
# =============================================================================
# Each state defines its type (what the Go interpreter does) and metadata.

# --- PM Phase ---
[states.pm_produce]
type = "produce"
skill = "pm-interview-producer"
skill_path = "skills/pm-interview-producer/SKILL.md"
fallback_model = "opus"
artifact = "requirements.md"
id_format = "REQ"

[states.pm_qa]
type = "qa"
skill = "qa"
skill_path = "skills/qa/SKILL.md"
fallback_model = "haiku"

[states.pm_decide]
type = "decide"

[states.pm_commit]
type = "commit"

