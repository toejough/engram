AC-1 (architectural): Implicit in all tests calling SelectQuestions
AC-2 (small gap): TEST-300, TEST-301, TEST-307
AC-3 (medium gap): TEST-302, TEST-308
AC-4 (large gap): TEST-303, TEST-309
AC-5 (context references): TEST-304, TEST-305
AC-6 (skip answered): TEST-306
"""

[[payload.checklist]]
