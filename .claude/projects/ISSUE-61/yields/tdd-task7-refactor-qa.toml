before = """
// Hardcoded validation:
if ga.GapSize != "" && ga.GapSize != "small" && ga.GapSize != "medium" && ga.GapSize != "large" {
    result.Errors = append(result.Errors, "invalid gap_size: must be one of: small, medium, large")
}

// Inline required fields list:
