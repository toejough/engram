[context]
project_name = "parallel-execution-improvements"
phase = "pm"
workflow = "new"

[input]
description = """
Improve parallel task execution in projctl. Originally three issues, now two after user decision:

ISSUE-39: Merge-on-complete pattern
- Problem: All 4 agent branches merged at end, causing conflict complexity
- Solution: Merge each branch immediately when agent completes
- AC: Orchestrator detects completion, merges immediately, later agents benefit from earlier merges

ISSUE-40: CLOSED (won't do) - User rejected premise. File overlap handled by rebasing/conflict resolution.

ISSUE-41: Documentation
- Problem: Lessons learned not captured
- Solution: Document parallel execution patterns
- AC: Documentation covers when to parallelize, worktree workflow, limitations
"""

linked_issues = ["ISSUE-39", "ISSUE-41"]

[user_responses]
q1_orchestrator = """
The orchestrator is the /project skill. This is a behavior change for the skill that manages
parallel execution - update the skill to implement merge-on-complete pattern.
"""

q2_file_overlap = """
REJECTED - Close ISSUE-40 as won't do. We can't always predict what else needs to change.
We handle this with rebasing and conflict resolution - that's just part of building software.
"""

q3_documentation = """
Documentation should be updated in:
1. docs/orchestration-system.md
2. docs/requirements.md (overall requirements)
3. The /project skill documentation (.claude/skills/project/)
"""

priority = "ISSUE-39 and ISSUE-41 are now the only issues. Treat equally."

[output]
yield_path = ".claude/projects/parallel-execution-improvements/yield-pm.toml"
artifact_path = ".claude/projects/parallel-execution-improvements/requirements.md"
