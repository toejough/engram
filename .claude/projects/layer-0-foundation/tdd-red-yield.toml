[[decisions]]
context = "Test organization"
choice = "Group tests by acceptance criteria with clear naming"
reason = "Each test function maps directly to one or more acceptance criteria, making test coverage easy to verify and maintaining traceability"
alternatives = ["Single table-driven test", "One test per acceptance criterion"]

[[decisions]]
context = "State file handling in tests"
choice = "Create temporary state.toml files in each test"
reason = "Tests are isolated and can run in parallel without interference. Each test controls its own state setup."
alternatives = ["Use mocks for state reading", "Share state across tests"]

[[decisions]]
context = "UUID validation approach"
choice = "Use regex patterns to validate UUID format in paths"
reason = "Regex provides readable validation and matches the actual UUID format we expect from github.com/google/uuid package"
alternatives = ["Parse and validate UUID separately", "Just check for uniqueness without format validation"]

[[decisions]]
context = "Property test scope"
choice = "Use rapid to test uniqueness across parallel invocations with concurrent goroutines"
reason = "Property-based testing with concurrency directly tests the parallel safety requirement, generating randomized inputs to explore edge cases"
alternatives = ["Only unit tests with fixed inputs", "Manual concurrency tests without property framework"]

[[decisions]]
context = "Error testing strategy"
choice = "Test both permission failures and missing directory scenarios"
reason = "Covers the two main failure modes: permission issues when creating directories and invalid project directory paths"
alternatives = ["Test only permission failures", "Mock file system operations"]

[[decisions]]
context = "Pattern matching approach"
choice = "Use compiled regex patterns to verify path format"
reason = "Regex patterns exactly match the specification format and are efficient for repeated validation. Clear pattern documentation in tests."
alternatives = ["Manual string parsing", "Split and validate each path component separately"]

