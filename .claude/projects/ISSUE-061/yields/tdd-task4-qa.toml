[yield]
type = "improvement-request"
timestamp = "2026-02-05T09:00:00Z"

[payload]
from_agent = "tdd-red-qa"
to_agent = "tdd-red-producer"
iteration = 2

[[payload.issues]]
id = "TEST-1"
severity = "high"
summary = "Tests check documentation strings rather than instruction completeness"
detail = """
The tests verify that specific strings like "projctl territory map" appear in SKILL.md,
but don't verify that the instructions are complete and actionable. For example,
test_territory_map_execution checks if "projctl territory map" is mentioned but doesn't
verify:
- Are parameters specified? (e.g., what path to map?)
- Is output format documented?
- Are instructions for parsing the output provided?
- Is the instruction placed in a clear step-by-step format?

For SKILL.md artifacts, tests should verify instruction COMPLETENESS, not just keyword presence.
"""
recommendation = """
Replace string matching tests with tests that verify instruction structure:
- Each step in GATHER phase is numbered/ordered
- Each step includes what to execute AND what to do with the output
- Error handling instructions are present for each external command
- Example commands are provided with expected output format
"""

[[payload.issues]]
id = "TEST-2"
severity = "medium"
summary = "Tests are too brittle - rely on exact text matching"
detail = """
Tests like line 81 check for exact phrases: grep -qE "(architecture decisions|technology stack|system design)"
This breaks if instructions use synonyms or rephrase the concepts. For SKILL.md, what matters is
that the instruction ACHIEVES the goal, not that it uses specific wording.
"""
recommendation = """
Focus tests on structural elements rather than text matching:
- Is there a step that queries for architecture-related information? (yes/no)
- Does that step specify what to do with the results? (yes/no)
- Is error handling specified? (yes/no)

Consider: does testing SKILL.md this way make sense, or should we test the BEHAVIOR
when Claude follows the SKILL.md instead?
"""

[[payload.issues]]
id = "TEST-3"
severity = "critical"
summary = "Tests pass if documentation exists, not if instructions are correct"
detail = """
test_error_handling_territory_failure (line 114) passes if it finds "blocked" near
"territory.*fail" in the SKILL.md. But this doesn't verify:
- Is the instruction ACTIONABLE? Does it tell Claude WHEN to yield blocked?
- Is the yield format correct? Does it reference YIELD.md protocol?
- Is the escalation path clear?

The test would pass for documentation like "territory failures are blocked" which
provides no actionable instruction for Claude to follow.
"""
recommendation = """
For SKILL.md testing, consider a different approach:
1. Test instruction structure (numbered steps, clear boundaries)
2. Test traceability (instructions reference other docs like YIELD.md)
3. Test completeness (each AC has a corresponding instruction section)
4. Accept that behavior testing requires actually running Claude with the SKILL.md

OR: Create integration tests that invoke arch-interview-producer with mock context
and verify it executes the GATHER phase correctly. This tests behavior, not docs.
"""

[[payload.issues]]
id = "TEST-4"
severity = "medium"
summary = "AC-4 'Parses results into structured data' is untestable for SKILL.md"
detail = """
test_result_parsing checks if words like "parse" or "structured data" appear in SKILL.md.
But parsing is an ACTION Claude takes, not documentation. The acceptance criterion
"Parses territory and memory results into structured data" is behavioral, but SKILL.md
is prescriptive documentation.

The AC should either:
1. Be rewritten for documentation: "Instructions provided for parsing results"
2. Be tested behaviorally: Run arch-interview-producer and verify it parses output
"""
recommendation = """
Escalate to breakdown phase: AC-4 is untestable as written for a SKILL.md artifact.
The AC describes runtime behavior but the artifact is documentation.

Proposed AC-4 revision: "GATHER phase includes instructions for parsing territory map
and memory query output, with examples of expected output format and how to extract
relevant data."
"""

[[payload.issues]]
id = "TEST-5"
severity = "low"
summary = "Integration test (test_full_gather_workflow) checks presence, not ordering"
detail = """
test_full_gather_workflow verifies all components are present in GATHER section but
doesn't verify they're in the correct execution order:
1. Territory map BEFORE memory query? (territory informs query construction)
2. Both BEFORE parsing?
3. All BEFORE error handling?

For workflow testing, order matters.
"""
recommendation = """
Add ordering assertions to test_full_gather_workflow:
- Extract line numbers for each component
- Assert territory_line < memory_line < parse_line < error_line
"""

[payload.summary]
tests_covering_all_acs = true
tests_fail_correctly = true
main_issue = "Tests check documentation keyword presence rather than instruction quality and completeness"
blocking = true

[context]
phase = "tdd-red"
role = "qa"
iteration = 2
max_iterations = 3
reviewed_artifact = "~/.claude/skills/arch-interview-producer/SKILL_test_gather.sh"
test_count = 10
acs_covered = "7/7"
