version = '2'

# Run options
[run]
relative-path-mode = 'gomod'

# Linter rules
[linters]
default = 'all'
disable = [
	# --- Inherited from targ (upstream preferences) ---
	'exhaustruct',    # too noisy for zero value structs
	'forbidigo',      # I print output on purpose sometimes
	'godot',          # has a bug that causes panics on some files
	'godox',          # saving todos till another validation step
	'ireturn',        # I like generic return types
	'nonamedreturns', # I like named returns
	'wsl',            # deprecated

	# --- Disabled for projctl (pre-existing violations; enable incrementally) ---
	'cyclop',            # cyclomatic complexity — 116 pre-existing
	'err113',            # sentinel error style — 178 pre-existing
	'errchkjson',        # JSON error checking — 35 pre-existing
	'funlen',            # function length — 94 pre-existing
	'gochecknoglobals',  # no package globals — 24 pre-existing
	'gocognit',          # cognitive complexity — 39 pre-existing
	'goconst',           # repeated string constants — 27 pre-existing
	'gosec',             # security linting — 131 pre-existing
	'lll',               # line length — 313 pre-existing
	'mnd',               # magic numbers — 249 pre-existing
	'nestif',            # nested if complexity — 30 pre-existing
	'noctx',             # HTTP context — 207 pre-existing
	'noinlineerr',       # inline error creation — 257 pre-existing
	'paralleltest',      # t.Parallel() everywhere — 415 pre-existing
	'revive',            # misc style rules — 208 pre-existing
	'tagliatelle',       # struct tag naming — 83 pre-existing
	'varnamelen',        # variable name length — 330 pre-existing
	'wrapcheck',         # error wrapping — 172 pre-existing
	'nilerr',            # nil error returns — 18 pre-existing
	'nilnil',            # nil,nil returns — 12 pre-existing
	'rowserrcheck',      # sql rows error checking — 28 pre-existing
	'sqlclosecheck',     # sql close checking — 19 pre-existing
	'dupl',              # duplicate code — 8 pre-existing
	'gocyclo',           # cyclomatic complexity — 13 pre-existing
	'gocritic',          # misc style/perf — 13 pre-existing
	'prealloc',          # slice preallocation — 14 pre-existing
	'unparam',           # unused parameters — 14 pre-existing
	'contextcheck',      # context propagation — 5 pre-existing
	'maintidx',          # maintenance index — 7 pre-existing
	'musttag',           # struct tag requirements — 7 pre-existing
]

# Exclude certain linters from test files
[[linters.exclusions.rules]]
path = '_test\.go$'
linters = [
	'dogsled',
	'dupl',
	'errcheck',
	'musttag',
	'testpackage',
	'tparallel',
]

# Allow dot imports in test files (gomega requires them)
[[linters.exclusions.rules]]
path = '_test\.go$'
text = 'dot-imports'

[linters.settings.depguard.rules.all]
files = ['$all', '!$test']
allow = [
	'$gostd',
	'github.com/BurntSushi/toml',
	'github.com/asg017/sqlite-vec-go-bindings',
	'github.com/mattn/go-sqlite3',
	'github.com/toejough/projctl',
	'github.com/toejough/targ',
	'github.com/yalue/onnxruntime_go',
	'gopkg.in/yaml.v3',
]

[linters.settings.depguard.rules.test]
files = ['$test']
allow = [
	'$gostd',
	'github.com/BurntSushi/toml',
	'github.com/asg017/sqlite-vec-go-bindings',
	'github.com/mattn/go-sqlite3',
	'github.com/onsi/gomega',
	'github.com/toejough/projctl',
	'github.com/toejough/targ',
	'github.com/yalue/onnxruntime_go',
	'gopkg.in/yaml.v3',
	'pgregory.net/rapid',
]

[linters.settings.nlreturn]
block-size = 2

[linters.settings.unused]
field-writes-are-uses = false
exported-fields-are-used = false
local-variables-are-used = false

[linters.settings.wrapcheck]
# Allow internal packages without wrapping (they're part of this project)
ignore-package-globs = ['*/internal/*']

# how to handle the issues the linters find
[issues]
# Apply the fixes detected by the linters and formatters (if it's supported by the linter). Default: false
# if there are easy canonical fixes, just do them
fix = true
# Maximum count of issues with the same text. Set to 0 to disable. Default: 3
# Repeated issues don't bother me - I'll count on the issues per linter rule to limit the noise
max-same-issues = 0
# Maximum issues count per one linter. Set to 0 to disable. Default: 50
# I want to see when there's a lot of findings, but ten is enough to get the idea
max-issues-per-linter = 10

# how to show the issues the linters find
[output]
sort-order = ['severity', 'linter', 'file']

# The formats used to render issues.
[output.formats.tab]
path = "stdout"
