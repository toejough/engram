version = '2'

# Run options
[run]
relative-path-mode = 'gomod'

# Linter rules
[linters]
default = 'all'
disable = [
	'exhaustruct',    # too noisy for zero value structs
	'godot',          # has a bug that causes panics on some files
	'godox',          # saving todos till another validation step
	'ireturn',        # I like generic return types
	'nonamedreturns', # I like named returns
	'wsl',            # deprecated
]

# Exclude certain linters from test files
[[linters.exclusions.rules]]
path = '_test\.go$'
linters = [
	'dogsled',
	'dupl',
	'err113',
	'funlen',
	'gochecknoglobals',
	'goconst',
	'gosec',
	'mnd',
	'noctx',
	'noinlineerr',
	'wrapcheck',
]

# Allow dot imports in test files (gomega requires them)
[[linters.exclusions.rules]]
path = '_test\.go$'
text = 'dot-imports'

# #700: forbidigo applies only to internal non-test code (edge wiring in cmd/ and
# dev tooling legitimately call the forbidden symbols).
[[linters.exclusions.rules]]
linters = ['forbidigo']
path-except = '^internal/'

[[linters.exclusions.rules]]
linters = ['forbidigo']
path = '_test\.go$'

[linters.settings.depguard.rules.all]
files = ['$all', '!$test']
allow = [
	'$gostd',
	'github.com/toejough/engram',
	'github.com/BurntSushi/toml',
	'github.com/akedrou/textdiff',
	'github.com/bmatcuk/doublestar/v4',
	'github.com/fsnotify/fsnotify',
	'github.com/charmbracelet/lipgloss',
	'github.com/dave/dst',
	'github.com/toejough/go-reorder',
	'github.com/toejough/imptest',
	'github.com/toejough/targ',
	'golang.org/x/tools/go/packages',
	'go.yaml.in/yaml/v3',
	'modernc.org/sqlite',
	# Embedder pipeline (engram query spike).
	'github.com/knights-analytics/hugot',
	'github.com/knights-analytics/hugot/pipelines',
]

[linters.settings.depguard.rules.test]
files = ['$test']
allow = [
	'$gostd',
	'github.com/toejough/engram',
	'github.com/BurntSushi/toml',
	'github.com/akedrou/textdiff',
	'github.com/charmbracelet/lipgloss',
	'github.com/dave/dst',
	'github.com/onsi/gomega',
	'github.com/toejough/imptest',
	'github.com/toejough/targ',
	'github.com/toejough/testredundancy',
	'go.yaml.in/yaml/v3',
	'modernc.org/sqlite',
	'pgregory.net/rapid',
	# Embedder parity gate (engram query spike).
	'github.com/knights-analytics/hugot',
]

# #700: internal/ purity â€” default-deny. Anything not prefix-matched below is denied
# in internal non-test code. NO file carve-outs: raw I/O primitives enter from
# cmd/engram's checker-thin wiring (cli.Primitives; targ check-thin-api enforces that
# side), ALL adapter composition is injected in internal/cli, and the only real-os code
# under internal/ sits in _test files â€” excluded via '!$test' (sanctioned by the revised
# composition doctrine).
# Glob form per R9: the issue-AC literal 'internal/**' was tried first and the
# negative probe (os.Getenv in an internal file) stayed SILENT â€” root-anchored
# globs never match depguard's full file paths. The prototype-confirmed
# '**/internal/**' below is the empirically-validated form (probe fires); the
# issue #700 AC wording is being amended to match (R9).
[linters.settings.depguard.rules.internal-purity]
files = ['**/internal/**', '!$test']
allow = [
	'strings', 'fmt', 'errors', 'sort', 'slices', 'maps', 'strconv', 'unicode',
	'bufio', 'bytes', 'io', 'path', 'regexp',
	'encoding/json', 'encoding/hex', 'crypto/sha256', 'hash/fnv', 'math', 'time',
	'context', 'sync', 'embed',
	'github.com/toejough/engram',
	'go.yaml.in/yaml/v3',
	'github.com/toejough/targ',
]

[linters.settings.forbidigo]
# Custom list REPLACES the fmt.Print defaults â€” printing stays legal (repo prints on purpose).
analyze-types = true

[[linters.settings.forbidigo.forbid]]
pattern = '^time\.Now$'
msg = 'inject a clock via cli.Deps.Now (#700)'

[[linters.settings.forbidigo.forbid]]
pattern = '^time\.Since$'
msg = 'inject a clock via cli.Deps.Now (#700)'

[[linters.settings.forbidigo.forbid]]
pattern = '^time\.Tick$'
msg = 'inject a clock via cli.Deps.Now (#700)'

[[linters.settings.forbidigo.forbid]]
pattern = '^targ\.Main$'
msg = 'targ dispatch is edge work â€” call from cmd/engram only (#700)'

[[linters.settings.forbidigo.forbid]]
pattern = '.*'
pkg = '^math/rand$'
msg = 'math/rand v1 is banned â€” use a seeded math/rand/v2 *rand.Rand (#700)'

[[linters.settings.forbidigo.forbid]]
pattern = '^rand\.(N|Int32|Int64|Int32N|Int64N|IntN|Int|Uint32|Uint64|Uint32N|Uint64N|UintN|Uint|Float32|Float64|NormFloat64|ExpFloat64|Perm|Shuffle)$'
pkg = '^math/rand/v2$'
msg = 'auto-seeded global PRNG is banned â€” use a seeded *rand.Rand (#700)'

[linters.settings.nlreturn]
block-size = 2

[linters.settings.varnamelen]
# ignore-decls should work for conventional declarations like 't *testing.T' but doesn't
# See: https://github.com/blizzy78/varnamelen/issues/5
# Using ignore-names as workaround
ignore-names = [
	't',
	'b',
	'rt',
	'a',
	'g',
	'i',
	'j',
	'fs',
	'fn',
	'ok',
	'r',
	'p',
	'mt',
	'f',
	'v',
	'w',
	'pc',
	'm',
	'n',
	'ch',
	'wg',
	'tc',
	'tt',
	'fv',
	'ft',
	'mu',
	'sb',
	'e',
	's',
	'hf',
	'et',
	'pt',
	'st',
	'd',
	'h',
	'id',
	'db',
]

[linters.settings.unused]
field-writes-are-uses = false
exported-fields-are-used = false
local-variables-are-used = false

[linters.settings.tagliatelle.case.rules]
# Project convention: YAML keys are snake_case (vault frontmatter spec).
yaml = 'snake'

[linters.settings.wrapcheck]
# Allow internal packages without wrapping (they're part of this project)
ignore-package-globs = ['*/internal/*']

# how to handle the issues the linters find
[issues]
# Apply the fixes detected by the linters and formatters (if it's supported by the linter). Default: false
# if there are easy canonical fixes, just do them
fix = true
# Maximum count of issues with the same text. Set to 0 to disable. Default: 3
# Repeated issues don't bother me - I'll count on the issues per linter rule to limit the noise
max-same-issues = 0
# Maximum issues count per one linter. Set to 0 to disable. Default: 50
# #700: never truncate findings â€” the default hid 14 of 24 findings at prototype time.
max-issues-per-linter = 0

# how to show the issues the linters find
[output]
sort-order = ['severity', 'linter', 'file']

# The formats used to render issues.
[output.formats.tab]
path = "stdout"
