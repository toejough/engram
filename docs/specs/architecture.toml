**Decision:** New `internal/learn/incremental.go` package that orchestrates incremental extraction: delta reading â†’ stripping â†’ learning â†’ offset update.

```go
type IncrementalLearner struct {
    TranscriptPath  string
    SessionID       string
    DataDir         string
    OffsetStore     OffsetStore
    DeltaReader     DeltaReader       // from internal/context (ARCH-28 reuse for UC-14)
    Stripper        Stripper          // from internal/context (ARCH-29 reuse for UC-14)
