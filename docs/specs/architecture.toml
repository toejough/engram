**Decision:** Define `EnforcementReader` interface in `internal/surface/surface.go` with `GetEnforcementLevel(id string) (string, error)`. Injected via `WithEnforcementReader` option. Absent reader defaults all memories to advisory level (normal format).

**Rationale:** Decouples the surface package from the registry package. The surface pipeline uses the level for rendering only â€” it does not update registry state.

**Data flow:** `Surfacer.enforcementLevelFor(path)` â†’ `EnforcementReader.GetEnforcementLevel(path)` â†’ level string â†’ `formatMemoryLine(slug, principle, level, annotation)`.

**Traces to:** REQ-P6e-5, REQ-P6e-6, REQ-P6e-7, ARCH-7 (DI everywhere)

