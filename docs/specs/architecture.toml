[ARCH-81]
name = "Surfacing Log Turn Isolation via Atomic Rename"
traces_to = ["UC-15"]
hash = "ba78d223"
body = '''
**Decision:** The evaluator atomically renames `surfacing-log.jsonl` to a
per-turn private file (`surfacing-log-<timestamp>.jsonl.tmp`) before reading
it. This eliminates the data loss race when stop.sh runs async: new surfacing
events written during evaluation append to a fresh `surfacing-log.jsonl`
while the evaluator safely reads its private snapshot.

```
rename  <dataDir>/surfacing-log.jsonl
     â†’ <dataDir>/surfacing-log-<evalTimestamp>.jsonl.tmp   (atomic)
read    <dataDir>/surfacing-log-<evalTimestamp>.jsonl.tmp
delete  <dataDir>/surfacing-log-<evalTimestamp>.jsonl.tmp
```

**Why rename instead of read-then-delete:**
- read-then-delete window allows concurrent appenders to lose events
- atomic rename removes the source path instantly; subsequent appenders
  create a new `surfacing-log.jsonl` for the next turn

**Missing file:** if `surfacing-log.jsonl` does not exist when rename is
attempted, the evaluator returns an empty entry list (no LLM call).

**Traces to:** REQ-26 (surfacing log lifecycle), ARCH-22 (surfacing log infra)

---
'''

[ARCH-82]
name = "TF-IDF cluster confidence scoring for consolidation (REQ-140)"
traces_to = ["UC-34", "REQ-140"]
hash = ""
body = '''
**Component:** `internal/signal/consolidate.go` (extension to Consolidator)

**Responsibility:** Compute TF-IDF cosine similarity within keyword-overlap clusters as a confidence signal. Does NOT participate in cluster formation â€” keyword overlap (REQ-130) is the sole clustering signal.

**Boundaries:**
- Inside: TF-IDF vector computation, cosine similarity, cluster confidence scoring
- Outside: Cluster formation (buildClusters), survivor selection, merge execution

**Dependencies:**
- Consolidator â†’ TextSimilarityScorer (injected interface, consumer-owned)
- Implementation adapter uses TF-IDF cosine similarity over keyword+principle text
- Does NOT depend on `internal/bm25` (BM25 is query-to-document; TF-IDF cosine is document-to-document)

**Interfaces:**

```go
// TextSimilarityScorer computes pairwise text similarity within a cluster.
// Returns a confidence score in [0,1] where 1 = identical content.
type TextSimilarityScorer interface {
    ClusterConfidence(texts []string) float64
}
```

**Integration point:** After `buildClusters`, before `mergeCluster`. Each cluster gets a confidence score. Clusters are sorted by confidence descending (merge high-confidence clusters first). Confidence is logged in stderr output (DES-48 extension) and included in `MergePlan` for dry-run visibility.

**Algorithm:**
1. For each cluster, extract keyword+principle text from each memory
2. Build TF-IDF vectors: tokenize â†’ compute term frequency â†’ compute inverse document frequency across all memories in the corpus (not just the cluster)
3. Compute average pairwise cosine similarity within the cluster
4. Return as cluster confidence in [0,1]

**Implementation location:** New file `internal/tfidf/tfidf.go` â€” pure computation, no I/O, no DI needed. The Consolidator receives it via `WithTextSimilarityScorer` option.

**ADR: Why not reuse internal/bm25?**
- Context: BM25 scores a query against a document corpus. Duplicate detection needs pairwise document similarity.
- Options: (A) Adapt BM25 by using each doc as query against others. (B) New TF-IDF cosine similarity.
- Decision: (B) â€” cosine similarity is the standard metric for document-to-document comparison. Adapting BM25 would misuse the algorithm and produce unintuitive scores.
- Consequences: New package, but small (~50 lines). Reuses `bm25.tokenize` pattern but not the package itself.

**REQ-140 enforcement:**
- AC(1,2,3): `buildClusters` unchanged â€” keyword overlap is sole gate
- AC(4): Confidence score orders clusters; does not filter them (filtering is a future enhancement gated on observability data)

**Traces to:** ARCH-79 (Consolidator), REQ-140 (tie-breaker constraint), DES-48 (stderr logging)

---
'''

[ARCH-9]
name = "Memory Storage and Retrieval"
traces_to = ["UC-2"]
hash = "2135e0e3"
body = '''
**Decision:** Memories are stored as individual TOML files in `<data-dir>/memories/`. Retrieval uses BM25 ranking: scan and parse all files, build a BM25 index on demand per query, score the input text against each memory, and return ranked results.

```go
type MemoryRetriever interface {
    ListMemories(ctx context.Context, dataDir string) ([]*Memory, error)
}

type BM25Scorer interface {
    Score(query string, memories []*Memory) []ScoredMemory
}

type ScoredMemory struct {
    Memory *Memory
    Score  float64
}

type Memory struct {
    Title             string
    Content           string
    Concepts          []string
    Keywords          []string
    AntiPattern       string // for PreToolUse enforcement
    Principle         string
    UpdatedAt         time.Time
    FilePath          string
    SurfacedCount     int       // instrumentation: total surfacing events
    LastSurfaced      time.Time // instrumentation: most recent surfacing
    SurfacingContexts []string  // instrumentation: recent context types (max 10)
}
```

Design choices:
- **No persistent database:** Each TOML file is a Memory record. Scan all files in memories/ on each query. For small corpora (hundreds of memories), scanning is faster than database setup.
- **BM25 indexing:** Per-query BM25 index built by concatenating searchable fields (title, content, principle, keywords, concepts, anti_pattern). No persistent index â€” rebuilt per call.
- **Ranking:** BM25 algorithm produces relevance scores; memories sorted by score descending. Results are top-N limited (top 10 for UserPromptSubmit, top 5 for PreToolUse).
- **File-based discovery:** `os.ReadDir(memdir)` + parse each `.toml` file. Errors on individual files don't block others.

**Traces to:** REQ-9 (SessionStart lists all), REQ-10 (UserPromptSubmit BM25 ranking), REQ-11 (PreToolUse BM25 ranking on anti-pattern candidates)

---
'''

