body = '''
New `MergeWriter` interface in `internal/learn`: `UpdateMerged(existing *memory.Stored, principle string, keywords, concepts []string, now time.Time) error`. Concrete implementation in `internal/memory` package reads existing TOML, updates `principle`, `keywords`, `concepts`, `updated_at`, writes back in place. New `RegistryAbsorber` interface in `internal/learn`: `RecordAbsorbed(existingPath, candidateTitle, contentHash string, now time.Time) error`. Registry implements it by finding the `InstructionEntry` by source path and appending an `AbsorbedRecord`. Both interfaces injected into `Learner` as optional fields (nil = feature disabled).

- Traces to: UC-33, ARCH-7 (DI everywhere)
- Rationale: DI on writer and absorber keeps the learn orchestrator testable; registry absorb is an optional side-effect that does not block merge success.

---

## P3: Memory Graph with Spreading Activation

### ARCH-P3-1: internal/graph/ package â€” pure link logic, no I/O (P3)

**Decision:** Create `internal/graph/` package with: `Builder` struct (`BuildConceptOverlap`, `BuildContentSimilarity`), `UpdateCoSurfacing(existing []registry.Link, pairWeight float64) []registry.Link`, `UpdateEvaluationCorrelation(existing []registry.Link) []registry.Link`, `Prune(links []registry.Link) []registry.Link`. Jaccard tokenizer as unexported function. Imports `internal/registry` (for Link type) and `internal/bm25`. No `os.*`, no `http.*`, no file I/O.

**Rationale:** Keeps graph algorithms testable in isolation. All callers supply data via parameters; callers own I/O.

**DI boundary:** All functions are pure inputâ†’output transformers. Registry mutations happen in callers via injected interfaces.

- Traces to: UC-32, ARCH-7 (DI everywhere)

---

### ARCH-P3-2: UpdateLinks on Registry interface and TOMLDirectoryStore (P3)

**Decision:** Add `UpdateLinks(id string, links []Link) error` to `Registry` interface. `TOMLDirectoryStore.UpdateLinks` acquires per-file flock, reads entry TOML, replaces `Links` field, rewrites atomically. Returns `ErrNotFound` if id absent.

**Rationale:** Consistent with existing Registry mutation pattern. Per-file flock for concurrent writes.

**Data flow:** `graph.Builder` â†’ `[]registry.Link` â†’ `Registry.UpdateLinks(id, links)` â†’ TOML persisted.

- Traces to: REQ-P3-2, ARCH-7

---

### ARCH-P3-3: LinkUpdater interface in surface package for co_surfacing (P3)

**Decision:** `LinkUpdater` interface in `internal/surface/`: `GetEntryLinks(id string) ([]GraphLink, error)` and `SetEntryLinks(id string, links []GraphLink) error` where `GraphLink = struct{ Target, Basis string; Weight float64; CoSurfacingCount int }`. `WithLinkUpdater(u LinkUpdater)` option. The CLI adapter wraps `registry.TOMLDirectoryStore` to satisfy this interface.

**Data flow:** Post top-N selection â†’ `updateCoSurfacingLinks(ctx, ids, updater)` â†’ for each pair: `GetEntryLinks` â†’ mutate â†’ `SetEntryLinks`. Fire-and-forget errors.

- Traces to: REQ-P3-5, ARCH-7

---

### ARCH-P3-4: Spreading activation via LinkReader in surface package (P3)

**Decision:** `LinkReader` interface in `internal/surface/`: `GetEntryLinks(id string) ([]GraphLink, error)`. `WithLinkReader(r LinkReader)` option (can be same concrete value as LinkUpdater â€” separate interface for read-only use). `applySpreadingActivation(candidates []candidate, baseScores map[string]float64, reader LinkReader) map[string]float64` pure function: for each candidate, fetch its links, sum `linked_base Ă— weight` for each link whose target is in baseScores, add `0.3 Ă— sum` to base.

**Rationale:** Read-only interface keeps activation logic testable with a simple stub.

- Traces to: REQ-P3-6, ARCH-7

---

### ARCH-P3-5: TitleFetcher interface in surface package for cluster notes (P3)

**Decision:** `TitleFetcher` interface: `GetTitle(id string) (string, bool)`. `WithTitleFetcher(f TitleFetcher)` option. `formatClusterNotes(links []GraphLink, fetcher TitleFetcher) string` returns up to 2 lines `  â€˘ see also: <title>\n` sorted by weight desc. Appended to each memory's formatted block in `formatMemoryLine`. The CLI adapter wraps `registry.TOMLDirectoryStore.Get` to implement TitleFetcher.

- Traces to: REQ-P3-7, ARCH-7

---

### ARCH-P3-6: EvalLinkUpdater interface in evaluate package (P3)

**Decision:** `EvalLinkUpdater` interface in `internal/evaluate/`: `GetEntryLinks(id string) ([]EvalLink, error)` and `SetEntryLinks(id string, links []EvalLink) error` where `EvalLink = struct{ Target, Basis string; Weight float64; CoSurfacingCount int }`. `WithEvalLinkUpdater(u EvalLinkUpdater)` option. After outcome map built, `updateEvaluationCorrelationLinks(ctx, followedIDs, updater)` called. Fire-and-forget errors.

- Traces to: REQ-P3-9, ARCH-7

---

### ARCH-P3-7: Learn-time link building wired in CLI (P3)

**Decision:** After `Registry.Register` or `Registry.RecordSurfacing` in the learn pipeline, the CLI wires a `graph.Builder` call to build concept_overlap + content_similarity links. Calls `registry.List()` to get existing entries, then `builder.BuildConceptOverlap` + `builder.BuildContentSimilarity`, merges the two link slices (dedup by target+basis), calls `registry.UpdateLinks`. Fire-and-forget on error.

**Rationale:** Learn pipeline is the natural place to build static links. CLI owns the wiring, internal/learn stays pure.

- Traces to: REQ-P3-3, REQ-P3-4, ARCH-7

---
'''

[ARCH-P5f-1]
name = "MergeResult type and RegistryLinker interface in internal/graph (P5f)"
traces_to = ["UC-P5f-1"]
hash = "e9756e4e"
body = '''
**Decision:** New file `internal/graph/recompute.go`. `MergeResult` struct: `MergedMemoryID string`, `AbsorbedMemoryID string`, `MergedTitle string`, `MergedContent string`, `MergedConceptSet []string`. `RegistryLinker` interface: `List() ([]registry.InstructionEntry, error)` and `UpdateLinks(id string, links []registry.Link) error`. Pure data; no I/O.

**Rationale:** MergeResult is the natural output of P5-core's merge step and the input to P5-full's link recomputation. Placing it in graph keeps the contract near the algorithm that consumes it. RegistryLinker follows ARCH-7 DI-everywhere pattern.

- Traces to: REQ-P5f-1, ARCH-7

---
'''

[ARCH-P5f-2]
name = "Builder.RecomputeMergeLinks in internal/graph (P5f)"
traces_to = ["UC-P5f-1"]
hash = "50518fb0"
body = '''
**Decision:** `func (b *Builder) RecomputeMergeLinks(result MergeResult, linker RegistryLinker) error` in `internal/graph/recompute.go`. Steps: (1) If AbsorbedMemoryID non-empty, call linker.List(), filter links in all entries, call linker.UpdateLinks per affected entry. (2) Build synthetic InstructionEntry for merged memory (ID=MergedMemoryID, Title=MergedTitle, Content=MergedContent). (3) Get existing links for merged entry from List() result; filter to keep only co_surfacing and evaluation_correlation. (4) Call BuildConceptOverlap + BuildContentSimilarity (excluding MergedMemoryID from corpus). (5) Merge kept + new links; call linker.UpdateLinks for merged entry.

**Rationale:** Pure function â€” all registry interaction through RegistryLinker. Reuses existing Builder methods for link computation. Single List() call for efficiency.

- Traces to: REQ-P5f-2, REQ-P5f-3, REQ-P5f-4, REQ-P5f-5, ARCH-7

---
'''

[ARCH-P5f-3]
name = "LinkRecomputer interface in learn package, optional on Learner (P5f)"
